<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Zam Planning & Consult</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <!-- NAVBAR -->
  <nav>
    <h1>Your Company</h1>
    <ul>
      <li><a href="#about">About</a></li>
      <li><a href="#services">Services</a></li>
      <li><a href="#contact">Contact</a></li>
    </ul>
  </nav>

  <!-- HERO -->
  <section id="hero">
    <h2>Planning & Consulting Services</h2>
    <p>We help businesses grow with strategy and clarity.</p>
  </section>

  <!-- ABOUT -->
  <section id="about">
    <h2>About Us</h2>
    <p>Write your company info here.</p>
  </section>

  <!-- SERVICES -->
  <section id="services">
    <h2>Our Services</h2>
    <p>List your services here.</p>
  </section>

  <!-- CONTACT -->
  <section id="contact">
    <h2>Contact Us</h2>
    <form action="https://formspree.io/f/xgodkkvj" method="POST">
      <input type="text" name="name" placeholder="Your Name" required />
      <input type="email" name="email" placeholder="Your Email" required />
      <textarea name="message" placeholder="Your Message" required></textarea>
      <button type="submit">Send Message</button>
    </form>
  </section>

</body>
</html>
